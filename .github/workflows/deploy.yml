name: Deploy Frontend Demo

on:
  push:
    branches: [main]
    tags:
      - "v*"

concurrency:
  group: deploy-frontend-demo
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -eu

            APP_DIR="/var/www/open-rag"
            APP_PORT="8447"

            mkdir -p "$APP_DIR"

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/${{ github.repository }} "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin
            git checkout main
            git reset --hard origin/main

            cd frontend
            /usr/bin/env bash -lc 'source "$HOME/.nvm/nvm.sh" 2>/dev/null || true; command -v pnpm >/dev/null 2>&1 || npm i -g pnpm; pnpm install --frozen-lockfile; VITE_DEMO_MODE=true pnpm build; command -v pm2 >/dev/null 2>&1 || npm i -g pm2 serve; command -v serve >/dev/null 2>&1 || npm i -g serve; pm2 delete open-rag-demo-frontend || true; pm2 start serve --name open-rag-demo-frontend -- -s dist -l 8447; pm2 save'
