name: Deploy Demo Frontend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy.yml"

concurrency:
  group: deploy-demo-frontend
  cancel-in-progress: true

jobs:
  deploy-demo:
    name: Build and Deploy Demo (Frontend)
    runs-on: ubuntu-latest
    environment: demo
    env:
      DEMO_PORT: ${{ vars.DEMO_PORT || '4173' }}
      DEPLOY_PATH: ${{ vars.DEMO_DEPLOY_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.28.0"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Verify formatting
        run: pnpm format:check
        working-directory: frontend

      - name: Run tests
        run: pnpm test
        working-directory: frontend

      - name: Build demo frontend bundle
        run: pnpm build
        working-directory: frontend
        env:
          VITE_DEMO_MODE: "true"
          VITE_API_BASE_URL: "http://127.0.0.1:8000/api/v1"

      - name: Package build output
        run: tar -czf frontend-demo-dist.tgz -C frontend/dist .

      - name: Upload bundle to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          source: frontend-demo-dist.tgz
          target: /tmp

      - name: Deploy and restart demo service
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEMO_PORT: ${{ env.DEMO_PORT }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          envs: DEMO_PORT,DEPLOY_PATH
          script: |
            set -euo pipefail

            if [ -z "${DEPLOY_PATH:-}" ]; then
              DEPLOY_PATH="$HOME/open-rag-demo-frontend"
            fi
            
            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
              nvm use --lts >/dev/null 2>&1 || true
            fi

            if ! command -v node >/dev/null 2>&1; then
              echo "Node.js is required on VPS for demo hosting"
              echo "Install Node 20+ for user $USER (or ensure nvm is installed and initialized)."
              exit 1
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2 serve
            elif ! command -v serve >/dev/null 2>&1; then
              npm install -g serve
            fi

            mkdir -p "$DEPLOY_PATH/releases" "$DEPLOY_PATH/shared"
            RELEASE_DIR="$DEPLOY_PATH/releases/$(date +%Y%m%d%H%M%S)"
            mkdir -p "$RELEASE_DIR"

            tar -xzf /tmp/frontend-demo-dist.tgz -C "$RELEASE_DIR"
            ln -sfn "$RELEASE_DIR" "$DEPLOY_PATH/current"

            cat > "$DEPLOY_PATH/shared/ecosystem.config.cjs" <<EOF
            module.exports = {
              apps: [
                {
                  name: "open-rag-demo-frontend",
                  cwd: "$DEPLOY_PATH/current",
                  script: "serve",
                  args: "-s . -l $DEMO_PORT",
                  env: {
                    NODE_ENV: "production"
                  }
                }
              ]
            };
            EOF

            pm2 startOrReload "$DEPLOY_PATH/shared/ecosystem.config.cjs"
            pm2 save

            # Keep only last 5 releases
            ls -1dt "$DEPLOY_PATH"/releases/* | tail -n +6 | xargs -r rm -rf
