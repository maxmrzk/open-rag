name: Deploy Demo Frontend

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEMO_PORT: ${{ vars.DEMO_PORT || '8447' }}
      DEMO_DEPLOY_PATH: ${{ vars.DEMO_DEPLOY_PATH || '/var/www/open-rag-demo-frontend' }}
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEMO_PORT: ${{ env.DEMO_PORT }}
          DEMO_DEPLOY_PATH: ${{ env.DEMO_DEPLOY_PATH }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          envs: DEMO_PORT,DEMO_DEPLOY_PATH
          script: |
            set -euo pipefail

            APP_DIR="${DEMO_DEPLOY_PATH}"
            APP_PORT="${DEMO_PORT}"

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
              nvm use --lts >/dev/null 2>&1 || true
            fi

            if [ ! -d .git ]; then
              git clone https://github.com/${{ github.repository }} .
            else
              git fetch --all --tags
            fi

            git checkout "${{ github.event.release.tag_name }}"

            if ! command -v node >/dev/null 2>&1; then
              echo "Node.js not found; installing Node.js 20..."
              apt-get update
              apt-get install -y ca-certificates curl gnupg
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
            fi

            if ! command -v pnpm >/dev/null 2>&1; then
              npm install -g pnpm
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2 serve
            elif ! command -v serve >/dev/null 2>&1; then
              npm install -g serve
            fi

            cd frontend
            pnpm install --frozen-lockfile
            VITE_DEMO_MODE=true pnpm build

            pm2 delete open-rag-demo-frontend || true
            pm2 start serve --name open-rag-demo-frontend -- -s dist -l "$APP_PORT"
            pm2 save
