name: Deploy Demo Frontend

on:
  push:
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -euo pipefail

            APP_DIR="${DEMO_DEPLOY_PATH:-$HOME/open-rag-demo-frontend}"
            APP_PORT="${DEMO_PORT:-8447}"

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            if [ ! -d .git ]; then
              git clone https://github.com/${{ github.repository }} .
            else
              git fetch --all --tags
            fi

            git checkout "${{ github.ref_name }}"

            if ! command -v node >/dev/null 2>&1; then
              echo "Node.js 20+ is required on VPS"
              exit 1
            fi

            if ! command -v pnpm >/dev/null 2>&1; then
              npm install -g pnpm
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2 serve
            elif ! command -v serve >/dev/null 2>&1; then
              npm install -g serve
            fi

            cd frontend
            pnpm install --frozen-lockfile
            VITE_DEMO_MODE=true pnpm build

            pm2 delete open-rag-demo-frontend || true
            pm2 start serve --name open-rag-demo-frontend -- -s dist -l "$APP_PORT"
            pm2 save
