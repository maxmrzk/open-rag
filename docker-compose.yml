# RAG System Builder — Docker Compose
# Starts: PostgreSQL, Redis, Qdrant, Neo4j, the FastAPI backend, and optionally the Vite dev frontend.
#
# Usage:
#   docker compose up -d postgres redis qdrant neo4j     # infrastructure only
#   docker compose up -d                                 # everything

version: "3.9"

services:

  # ─────────────────────────── Infrastructure ───────────────────────────────

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ragbuilder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - rag-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - rag-network

  qdrant:
    image: qdrant/qdrant:v1.8.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - rag-network

  neo4j:
    image: neo4j:5.15-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
    networks:
      - rag-network

  # ───────────────────────────── Backend ────────────────────────────────────

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/ragbuilder
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
      SECRET_FERNET_KEY: ${SECRET_FERNET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rag-network

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    command: arq app.worker.WorkerSettings
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/ragbuilder
      REDIS_URL: redis://redis:6379/0
      SECRET_FERNET_KEY: ${SECRET_FERNET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rag-network

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  neo4j_data:

networks:
  rag-network:
    driver: bridge
